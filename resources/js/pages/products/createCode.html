<script setup>
import { ref, reactive, computed, onMounted } from 'vue'
import { useToast } from 'primevue/usetoast'
import { useRouter } from 'vue-router'
import slugify from 'slugify'

// Components
import InputText from 'primevue/inputtext'
import InputNumber from 'primevue/inputnumber'
import Textarea from 'primevue/textarea'
import Button from 'primevue/button'
import Checkbox from 'primevue/checkbox'
import SelectButton from 'primevue/selectbutton'
import AutoComplete from 'primevue/autocomplete'
import TreeSelect from 'primevue/treeselect'
import FileUpload from 'primevue/fileupload'
import Calendar from 'primevue/calendar'
import Editor from 'primevue/editor'
import Chips from 'primevue/chips'
import Toast from 'primevue/toast'
import ProductVariations from './ProductVariations.vue'

const toast = useToast()
const router = useRouter()
const variationsRef = ref()

// Product reactive state with all fields
const product = reactive({
    // Basic Info
    name: '',
    slug: '',
    description: '',
    body: '',
    
    // Pricing
    price: 0,
    sale_price: null,
    
    // Inventory
    sku: '',
    quantity: 0,
    track_quantity: true,
    
    // Relations
    category_id: null,
    brand_id: null,
    
    // Status & Visibility
    is_visible: true,
    is_featured: false,
    type: 'simple',
    
    // Additional
    attributes: [],
    seo_title: '',
    seo_description: '',
    
    // Timestamps
    published_at: new Date()
})

// Image handling
const mainImage = ref(null)
const mainImagePreview = ref('')
const galleryImages = ref([])
const galleryPreviews = ref([])

// Form state
const loading = ref(false)
const errors = reactive({})

// Data sources
const categories = ref([
    {
        key: 'electronics',
        label: 'Electronics',
        children: [
            { key: 'phones', label: 'Phones & Accessories' },
            { key: 'computers', label: 'Computers & Laptops' },
            { key: 'audio', label: 'Audio & Headphones' }
        ]
    },
    {
        key: 'fashion',
        label: 'Fashion',
        children: [
            { key: 'clothing', label: 'Clothing' },
            { key: 'shoes', label: 'Shoes' },
            { key: 'accessories', label: 'Accessories' }
        ]
    },
    {
        key: 'home',
        label: 'Home & Garden',
        children: [
            { key: 'furniture', label: 'Furniture' },
            { key: 'decor', label: 'Home Decor' },
            { key: 'kitchen', label: 'Kitchenware' }
        ]
    }
])

const brands = ref([
    { id: 1, name: 'Apple' },
    { id: 2, name: 'Samsung' },
    { id: 3, name: 'Sony' },
    { id: 4, name: 'Nike' },
    { id: 5, name: 'Adidas' },
    { id: 6, name: 'IKEA' },
    { id: 7, name: 'Generic' }
])

const filteredBrands = ref([...brands.value])

// Options
const productTypes = ref([
    { label: 'Simple', value: 'simple' },
    { label: 'Variable', value: 'variable' },
    { label: 'Grouped', value: 'grouped' },
    { label: 'Digital', value: 'digital' }
])

const visibilityOptions = ref([
    { label: 'Published', value: true, icon: 'pi pi-eye' },
    { label: 'Draft', value: false, icon: 'pi pi-eye-slash' }
])

// Methods
const generateSlug = () => {
    if (!product.name) return
    product.slug = slugify(product.name, {
        lower: true,
        strict: true,
        trim: true
    })
}

const searchBrand = (event) => {
    if (!event.query.trim().length) {
        filteredBrands.value = [...brands.value]
    } else {
        filteredBrands.value = brands.value.filter(brand => {
            return brand.name.toLowerCase().includes(event.query.toLowerCase())
        })
    }
}

const onMainImageSelect = (event) => {
    const file = event.files[0]
    if (file) {
        mainImage.value = file
        mainImagePreview.value = URL.createObjectURL(file)
    }
}

const removeMainImage = () => {
    mainImage.value = null
    mainImagePreview.value = ''
}

const onGallerySelect = (event) => {
    event.files.forEach(file => {
        if (file) {
            galleryImages.value.push(file)
            galleryPreviews.value.push({
                file: file,
                preview: URL.createObjectURL(file)
            })
        }
    })
}

const removeGalleryImage = (index) => {
    galleryImages.value.splice(index, 1)
    galleryPreviews.value.splice(index, 1)
}

const handleVariationUpdate = (data) => {
    // Update product type based on variations
    if (data.hasVariations) {
        product.type = 'variable'
    } else {
        product.type = 'simple'
    }
}

const handleVariationChange = (data) => {
    console.log('Variation data changed:', data)
}

const validateForm = () => {
    // Clear previous errors
    Object.keys(errors).forEach(key => errors[key] = '')

    let isValid = true

    // Required fields validation
    if (!product.name.trim()) {
        errors.name = 'Product name is required'
        isValid = false
    }

    if (!product.slug.trim()) {
        errors.slug = 'Product slug is required'
        isValid = false
    }

    if (!product.category_id) {
        errors.category_id = 'Category is required'
        isValid = false
    }

    if (product.price <= 0) {
        errors.price = 'Price must be greater than 0'
        isValid = false
    }

    if (!product.body?.trim()) {
        errors.body = 'Product description is required'
        isValid = false
    }

    if (!mainImage.value) {
        toast.add({
            severity: 'error',
            summary: 'Validation Error',
            detail: 'Main product image is required',
            life: 5000
        })
        isValid = false
    }

    // Validate variations if product type is variable
    if (product.type === 'variable' && variationsRef.value) {
        const variationValidation = variationsRef.value.validate()
        if (!variationValidation.valid) {
            toast.add({
                severity: 'error',
                summary: 'Variation Error',
                detail: variationValidation.message,
                life: 5000
            })
            isValid = false
        }
    }

    return isValid
}

const submitForm = async () => {
    if (!validateForm()) {
        return
    }

    loading.value = true

    try {
        // Get variation data
        const variationData = variationsRef.value ? variationsRef.value.getVariationData() : null

        // Prepare form data
        const formData = new FormData()
        
        // Append all product data
        Object.keys(product).forEach(key => {
            const value = product[key]
            if (value !== null && value !== undefined) {
                if (Array.isArray(value)) {
                    formData.append(key, JSON.stringify(value))
                } else if (typeof value === 'object') {
                    formData.append(key, JSON.stringify(value))
                } else {
                    formData.append(key, value)
                }
            }
        })

        // Append images
        if (mainImage.value) {
            formData.append('image', mainImage.value)
        }

        galleryImages.value.forEach((image, index) => {
            formData.append(`gallery[${index}]`, image)
        })

        // Append variation data
        if (variationData) {
            formData.append('variations', JSON.stringify(variationData))
        }

        // Here you would make the actual API call
        console.log('Form data prepared:', Object.fromEntries(formData))

        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 2000))

        toast.add({
            severity: 'success',
            summary: 'Success',
            detail: 'Product created successfully!',
            life: 5000
        })

        // Redirect after success
        setTimeout(() => {
            router.push('/products')
        }, 1500)

    } catch (error) {
        console.error('Error creating product:', error)
        toast.add({
            severity: 'error',
            summary: 'Error',
            detail: 'Failed to create product. Please try again.',
            life: 5000
        })
    } finally {
        loading.value = false
    }
}

const saveDraft = () => {
    const variationData = variationsRef.value ? variationsRef.value.getVariationData() : null

    const draftData = {
        product: { ...product },
        variations: variationData,
        mainImage: mainImagePreview.value,
        galleryPreviews: galleryPreviews.value.map(img => img.preview)
    }

    localStorage.setItem('product_draft', JSON.stringify(draftData))

    toast.add({
        severity: 'info',
        summary: 'Draft Saved',
        detail: 'Product draft has been saved locally',
        life: 3000
    })
}

const loadDraft = () => {
    const draft = localStorage.getItem('product_draft')
    if (draft) {
        const draftData = JSON.parse(draft)
        Object.assign(product, draftData.product)
        
        if (draftData.mainImage) {
            mainImagePreview.value = draftData.mainImage
        }
        
        if (draftData.galleryPreviews) {
            galleryPreviews.value = draftData.galleryPreviews.map(preview => ({
                preview: preview,
                file: null // Note: Files can't be restored from localStorage
            }))
        }
        
        localStorage.removeItem('product_draft')
        
        toast.add({
            severity: 'info',
            summary: 'Draft Loaded',
            detail: 'Previous draft has been loaded',
            life: 3000
        })
    }
}

const previewProduct = () => {
    // Logic to preview product
    toast.add({
        severity: 'info',
        summary: 'Preview',
        detail: 'Preview functionality would open in a new tab',
        life: 3000
    })
}

const cancel = () => {
    if (confirm('Are you sure you want to cancel? Any unsaved changes will be lost.')) {
        router.push('/products')
    }
}

// Lifecycle hooks
onMounted(() => {
    loadDraft()
})

// Slug validation
const slugPattern = /^[a-z0-9]+(?:-[a-z0-9]+)*$/
watch(() => product.slug, (newSlug) => {
    if (newSlug && !slugPattern.test(newSlug)) {
        errors.slug = 'Slug can only contain lowercase letters, numbers, and hyphens'
    } else if (errors.slug) {
        errors.slug = ''
    }
})
